# 1. Database Connection URL using Railway's Private Internal Network
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?allowPublicKeyRetrieval=true&useSSL=false

# 2. Database Authentication Credentials
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# 3. Modern MySQL Driver Class Name
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Hibernate Auto Table Creation Strategy
spring.jpa.hibernate.ddl-auto=update

# 5. Tell Spring Boot to listen to Railway's Public Domain Port Allocation
server.port=${PORT:8080}